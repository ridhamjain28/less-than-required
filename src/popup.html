<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Less Than Required</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 340px;
            min-height: 400px;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 16px;
            color: var(--text-main);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            color: white;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .header small {
            opacity: 0.8;
            font-size: 12px;
            display: block;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #eef2ff;
            transform: scale(1.02);
        }

        .drop-zone.dragover {
            border-color: var(--primary);
            background: #eef2ff;
            transform: scale(0.98);
        }

        .drop-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            fill: #94a3b8;
            transition: all 0.3s;
        }

        .drop-zone:hover .drop-icon {
            fill: var(--primary);
            transform: translateY(-4px);
        }

        .drop-text {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 500;
        }

        .drop-subtext {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* Settings Section */
        .settings {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .setting-label {
            font-size: 13px;
            color: var(--text-sub);
        }

        .quality-select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }

        /* Result Section */
        .result-card {
            display: none;
            text-align: center;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: white;
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            70% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }

        .stat-box {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-value.highlight {
            color: var(--success);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-sub);
            margin-top: 8px;
            font-weight: 400;
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .hidden {
            display: none !important;
        }
    </style>
    <script src="utils/compressor.js"></script>
</head>

<body>
    <div class="header">
        <div class="logo">⚡</div>
        <div>
            <h1>Less Than Required</h1>
            <small>Compress files instantly</small>
        </div>
    </div>

    <div class="card">
        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <svg class="drop-icon" viewBox="0 0 24 24">
                <path
                    d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
            </svg>
            <div class="drop-text">Drop your file here</div>
            <div class="drop-subtext">or click to browse • Images & PDFs</div>
        </div>
        <input type="file" id="fileInput" style="display: none" accept="image/*,application/pdf">

        <!-- Settings -->
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">Compression Quality</span>
                <select class="quality-select" id="qualitySelect">
                    <option value="0.9">High (90%)</option>
                    <option value="0.7" selected>Medium (70%)</option>
                    <option value="0.5">Low (50%)</option>
                </select>
            </div>
        </div>

        <!-- Result View -->
        <div id="result" class="result-card">
            <div class="success-icon">✓</div>
            <div class="drop-text">Compression Complete!</div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="origSize">-</div>
                    <div class="stat-label">Before</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value highlight" id="compSize">-</div>
                    <div class="stat-label">After</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value highlight" id="savedPercent">-</div>
                    <div class="stat-label">Saved</div>
                </div>
            </div>

            <a id="downloadLink" href="#" class="btn">⬇️ Download Compressed File</a>
            <button id="resetBtn" class="btn btn-secondary">Compress Another</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
