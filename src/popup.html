<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Less Than Required</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --bg: rgba(17, 24, 39, 0.95);
            --card-bg: rgba(31, 41, 55, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 340px;
            min-height: 400px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo {
            width: 44px;
            height: 44px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--primary);
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .header small {
            color: var(--text-sub);
            font-size: 13px;
            display: block;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(0, 0, 0, 0.2);
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
            transform: scale(1.02);
        }

        .drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
            transform: scale(0.98);
        }

        .drop-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            fill: var(--text-sub);
            transition: all 0.3s;
        }

        .drop-zone:hover .drop-icon {
            fill: var(--primary);
            transform: translateY(-4px);
        }

        .drop-text {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 500;
        }

        .drop-subtext {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 6px;
        }

        /* Settings Section */
        .settings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .setting-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub);
        }

        .quality-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            width: 160px;
        }
        
        .quality-select:focus {
            border-color: var(--primary);
        }
        
        .quality-select option {
            background: #1f2937;
            color: white;
        }

        .custom-settings {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .custom-settings.show {
            display: block;
        }

        .setting-input {
            width: 60px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            text-align: right;
            font-size: 12px;
        }

        .setting-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .setting-row.small-gap {
            margin-bottom: 6px;
        }

        /* Result Section */
        .result-card {
            display: none;
            text-align: center;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 56px;
            height: 56px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: var(--success);
            animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .stat-value.highlight {
            color: var(--success);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-sub);
            margin-top: 8px;
            border: 1px solid transparent;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: var(--border);
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
    <script src="utils/pdf-lib.min.js"></script>
    <script src="utils/compressor.js"></script>
</head>

<body>
    <div class="header">
        <div class="logo">⚡</div>
        <div>
            <h1>Less Than Required</h1>
            <small>Compress files instantly</small>
        </div>
    </div>

    <div class="card">
        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <svg class="drop-icon" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
            </svg>
            <div class="drop-text">Drop your file here</div>
            <div class="drop-subtext">or click to browse • Images & PDFs</div>
        </div>
        <input type="file" id="fileInput" style="display: none" accept="image/*,application/pdf">

        <!-- Settings -->
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">Preset</span>
                <select class="quality-select" id="presetSelect">
                    <option value="auto" selected>Auto Compress</option>
                    <option value="passport">Passport Photo (India)</option>
                    <option value="signature">Signature</option>
                    <option value="doc_pdf">Document PDF</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>

            <!-- Custom Settings (Hidden by default) -->
            <div id="customSettings" class="custom-settings">
                <div class="setting-row small-gap">
                    <span class="setting-label">Max Size (KB)</span>
                    <input type="number" id="targetKB" class="setting-input" placeholder="e.g. 50">
                </div>
                <div class="setting-row small-gap">
                    <span class="setting-label">Width (px)</span>
                    <input type="number" id="targetWidth" class="setting-input" placeholder="Auto">
                </div>
                <div class="setting-row small-gap">
                    <span class="setting-label">Height (px)</span>
                    <input type="number" id="targetHeight" class="setting-input" placeholder="Auto">
                </div>
                <div class="setting-row small-gap">
                    <span class="setting-label">Format</span>
                    <select id="targetFormat" class="setting-input" style="width: 80px; text-align: left;">
                        <option value="auto">Keep</option>
                        <option value="image/jpeg">JPG</option>
                        <option value="image/png">PNG</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Result View -->
        <div id="result" class="result-card">
            <div class="success-icon">✓</div>
            <div class="drop-text">Compression Complete!</div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="origSize">-</div>
                    <div class="stat-label">Before</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value highlight" id="compSize">-</div>
                    <div class="stat-label">After</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value highlight" id="savedPercent">-</div>
                    <div class="stat-label">Saved</div>
                </div>
            </div>

            <a id="downloadLink" href="#" class="btn">⬇️ Download File</a>
            <button id="resetBtn" class="btn btn-secondary">Compress Another</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
