<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Less Than Required</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 222.2 84% 4.9%;
            --primary: 221.2 83.2% 53.3%; /* A nice shadcn blue */
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 47.4% 11.2%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 47.4% 11.2%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 221.2 83.2% 53.3%;
            --radius: 0.5rem;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: 222.2 84% 4.9%;
                --foreground: 210 40% 98%;
                --card: 222.2 84% 4.9%;
                --card-foreground: 210 40% 98%;
                --popover: 222.2 84% 4.9%;
                --popover-foreground: 210 40% 98%;
                --primary: 217.2 91.2% 59.8%;
                --primary-foreground: 222.2 47.4% 11.2%;
                --secondary: 217.2 32.6% 17.5%;
                --secondary-foreground: 210 40% 98%;
                --muted: 217.2 32.6% 17.5%;
                --muted-foreground: 215 20.2% 65.1%;
                --accent: 217.2 32.6% 17.5%;
                --accent-foreground: 210 40% 98%;
                --destructive: 0 62.8% 30.6%;
                --destructive-foreground: 210 40% 98%;
                --border: 217.2 32.6% 17.5%;
                --input: 217.2 32.6% 17.5%;
                --ring: 224.3 76.3% 48%;
            }
        }

        * {
            box-sizing: border-box;
            border-color: hsl(var(--border));
        }

        body {
            width: 360px;
            min-height: 480px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            margin: 0;
            padding: 1.25rem;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .logo {
            width: 2.5rem;
            height: 2.5rem;
            background-color: hsl(var(--primary) / 0.1);
            color: hsl(var(--primary));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .header h1 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .header small {
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
            display: block;
            margin-top: 0.125rem;
        }

        .card {
            background-color: hsl(var(--card));
            color: hsl(var(--card-foreground));
            border: 1px solid hsl(var(--border));
            border-radius: calc(var(--radius) + 2px);
            padding: 1.25rem;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .drop-zone {
            border: 2px dashed hsl(var(--border));
            border-radius: var(--radius);
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            background-color: hsl(var(--background));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .drop-zone:hover, .drop-zone.dragover {
            background-color: hsl(var(--muted) / 0.5);
            border-color: hsl(var(--primary) / 0.5);
        }

        .drop-icon {
            width: 2rem;
            height: 2rem;
            fill: hsl(var(--muted-foreground));
            transition: fill 0.2s;
        }

        .drop-zone:hover .drop-icon, .drop-zone.dragover .drop-icon {
            fill: hsl(var(--primary));
        }

        .drop-text {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .drop-subtext {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
        }

        /* Settings Section */
        .settings {
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid hsl(var(--border));
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .setting-label {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .quality-select, .setting-input {
            display: flex;
            height: 2.25rem;
            width: 100%;
            border-radius: var(--radius);
            border: 1px solid hsl(var(--input));
            background-color: hsl(var(--background));
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            font-family: inherit;
            color: hsl(var(--foreground));
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        
        .quality-select {
            width: 180px;
            cursor: pointer;
        }

        .quality-select:focus-visible, .setting-input:focus-visible {
            border-color: hsl(var(--ring));
            box-shadow: 0 0 0 1px hsl(var(--ring));
        }

        .custom-settings {
            display: none;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem;
            background-color: hsl(var(--muted) / 0.3);
            border-radius: var(--radius);
            border: 1px solid hsl(var(--border));
            margin-top: 0.5rem;
        }

        .custom-settings.show {
            display: flex;
        }

        .setting-input {
            width: 100px;
        }

        .setting-row.small-gap {
            margin-bottom: 0;
        }

        /* Result Section */
        .result-card {
            display: none;
            text-align: center;
        }

        .result-card.show {
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 3rem;
            height: 3rem;
            background-color: hsl(var(--primary) / 0.1);
            color: hsl(var(--primary));
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            margin: 1.25rem 0;
        }

        .stat-box {
            background-color: hsl(var(--muted) / 0.5);
            padding: 0.75rem 0.5rem;
            border-radius: var(--radius);
            border: 1px solid hsl(var(--border));
        }

        .stat-value {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .stat-value.highlight {
            color: hsl(var(--primary));
        }

        .stat-label {
            font-size: 0.65rem;
            color: hsl(var(--muted-foreground));
            text-transform: uppercase;
            font-weight: 500;
            margin-top: 0.25rem;
            letter-spacing: 0.05em;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            height: 2.5rem;
            padding: 0 1rem;
            width: 100%;
            transition: background-color 0.2s, opacity 0.2s;
            cursor: pointer;
            text-decoration: none;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: transparent;
            color: hsl(var(--foreground));
            border: 1px solid hsl(var(--border));
            margin-top: 0.5rem;
        }

        .btn-secondary:hover {
            background-color: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
        }

        .hidden {
            display: none !important;
        }
    </style>
    <script src="utils/pdf-lib.min.js"></script>
    <script src="utils/compressor.js"></script>
</head>

<body>
    <div class="header">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
        </div>
        <div>
            <h1>Less Than Required</h1>
            <small>Compress files instantly</small>
        </div>
    </div>

    <div class="card">
        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <svg class="drop-icon" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
            </svg>
            <div class="drop-text">Drop your file here</div>
            <div class="drop-subtext">or click to browse • Images & PDFs</div>
        </div>
        <input type="file" id="fileInput" style="display: none" accept="image/*,application/pdf">

        <!-- Settings -->
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">Preset</span>
                <select class="quality-select" id="presetSelect">
                    <option value="auto" selected>Auto Compress</option>
                    <option value="passport">Passport Photo (India)</option>
                    <option value="signature">Signature</option>
                    <option value="doc_pdf">Document PDF</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>

            <!-- Custom Settings (Hidden by default) -->
            <div id="customSettings" class="custom-settings">
                <div class="setting-row small-gap">
                    <span class="setting-label">Max Size (KB)</span>
                    <input type="number" id="targetKB" class="setting-input" placeholder="e.g. 50">
                </div>
                <div class="setting-row small-gap">
                    <span class="setting-label">Width (px)</span>
                    <input type="number" id="targetWidth" class="setting-input" placeholder="Auto">
                </div>
                <div class="setting-row small-gap">
                    <span class="setting-label">Height (px)</span>
                    <input type="number" id="targetHeight" class="setting-input" placeholder="Auto">
                </div>
                <div class="setting-row small-gap">
                    <span class="setting-label">Format</span>
                    <select id="targetFormat" class="setting-input" style="width: 80px; text-align: left;">
                        <option value="auto">Keep</option>
                        <option value="image/jpeg">JPG</option>
                        <option value="image/png">PNG</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Result View -->
        <div id="result" class="result-card">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div class="drop-text">Compression Complete!</div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="origSize">-</div>
                    <div class="stat-label">Before</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value highlight" id="compSize">-</div>
                    <div class="stat-label">After</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value highlight" id="savedPercent">-</div>
                    <div class="stat-label">Saved</div>
                </div>
            </div>

            <a id="downloadLink" href="#" class="btn btn-primary hidden" style="gap: 8px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                Download File
            </a>
            <button id="resetBtn" class="btn btn-secondary hidden">Compress Another</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
