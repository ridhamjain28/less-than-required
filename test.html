<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Test Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed #cbd5e1;
            padding: 30px;
            border-radius: 8px;
            margin-top: 20px;
        }

        input[type="file"] {
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Test File Upload</h2>
        <p>Select a large image (>1MB) to test the extension.</p>

        <div class="upload-box">
            <input type="file" id="testInput" accept="image/*,application/pdf">
            <div id="fileInfo" style="margin-top: 15px; font-weight: bold; color: #4f46e5;"></div>
        </div>

        <p style="margin-top: 20px; font-size: 12px; color: #999;">
            (The extension should detect this input and show a notification)
        </p>
    </div>

    <script>
        const input = document.getElementById('testInput');
        const info = document.getElementById('fileInfo');

        input.addEventListener('change', () => {
            if (input.files.length > 0) {
                const file = input.files[0];
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                info.textContent = `Selected: ${file.name} (${sizeMB} MB)`;
            } else {
                info.textContent = '';
            }
        });
    </script>
</body>

</html>
